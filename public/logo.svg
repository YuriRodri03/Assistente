<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definição dos gradientes de cores dinâmicas -->
  <defs>
    <linearGradient id="gradientePrincipal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" /> <!-- Violet-600 -->
      <stop offset="60%" stop-color="#6d28d9" /> <!-- Violet-700 -->
      <stop offset="100%" stop-color="#4c1d95" /> <!-- Violet-900 -->
    </linearGradient>
    <linearGradient id="gradienteSecundario" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" /> <!-- Violet-400 -->
      <stop offset="100%" stop-color="#7c3aed" /> <!-- Violet-600 -->
    </linearGradient>
    <filter id="brilhoSuave" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#7c3aed" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Fundo sutil para contraste em modo escuro ou claro (Opcional, transparente se removido) -->
  <rect width="512" height="512" rx="128" fill="transparent"/>

  <!-- Grupo central com efeito de sombra -->
  <g filter="url(#brilhoSuave)">
    <!-- Escudo/Hexágono base que representa estabilidade e organização -->
    <path d="M256,40 L430,140 L430,340 L256,440 L82,340 L82,140 Z" 
          fill="url(#gradientePrincipal)" />

    <!-- Forma geométrica interna que simula conexões neurais e fluxos de dados -->
    <path d="M256,110 L370,175 L370,305 L256,370 L142,305 L142,175 Z" 
          fill="#09090b" opacity="0.3" />

    <!-- Núcleo Central de Inteligência (Esfera flutuante modular) -->
    <circle cx="256" cy="240" r="55" fill="url(#gradienteSecundario)" />
    
    <!-- Órbita de dados e integração modular -->
    <path d="M190,240 A66,66 0 1,1 322,240 A66,66 0 1,1 190,240" 
          fill="none" stroke="#ffffff" stroke-width="8" stroke-dasharray="16 24" stroke-linecap="round" opacity="0.8" />

    <!-- Vetores geométricos superiores de expansão de tarefas -->
    <path d="M256,40 L256,110 M430,140 L370,175 M430,340 L370,305 M256,440 L256,370 M82,340 L142,305 M82,140 L142,175" 
          stroke="url(#gradienteSecundario)" stroke-width="6" stroke-linecap="round" opacity="0.5" />
          
    <!-- Ponto focal de precisão acadêmica/dados -->
    <circle cx="256" cy="240" r="14" fill="#ffffff" />
  </g>
</svg>
